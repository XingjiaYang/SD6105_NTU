<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admissions Funnel: High Contrast Conversion</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a202c; margin-top: 0; }
        p.subtitle { text-align: center; color: #718096; font-size: 14px; margin-bottom: 30px; }

        .controls { 
            display: grid; grid-template-columns: 1fr 150px; gap: 15px; 
            margin-bottom: 40px; padding: 20px; background: #f8fafc; border-radius: 12px;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        
        #funnel-container { width: 100%; height: 550px; position: relative; }
        
        /* Funnel Segment Styling */
        .funnel-path { stroke: #fff; stroke-width: 2px; transition: opacity 0.2s; cursor: pointer; }
        .funnel-path:hover { opacity: 0.9; }
        
        /* Stage and Count Labels */
        .stage-label { font-size: 13px; font-weight: 700; fill: #475569; }
        .count-label { font-size: 16px; font-weight: 800; fill: #1e293b; }
        
        /* High Contrast Conversion Badges */
        .badge-bg { fill: #1e293b; rx: 6; ry: 6; }
        .badge-text { font-size: 12px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
        .badge-desc { font-size: 10px; font-weight: 500; fill: #94a3b8; text-anchor: middle; text-transform: uppercase; }
        
        .no-data { display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8; font-style: italic; }
        #tooltip { position: absolute; background: #1e293b; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 100; }
    </style>
</head>
<body>

<div class="card">
    <h2>Admissions Funnel Analysis</h2>
    <p class="subtitle">Focus on the key conversion metrics: Admission Rate and Enrollment Yield.</p>
    
    <div class="controls">
        <div class="control-group">
            <label>1. Search Institution</label>
            <input type="text" id="school-search" placeholder="Search school name..." list="school-list">
            <datalist id="school-list"></datalist>
        </div>
        <div class="control-group">
            <label>2. Year</label>
            <select id="year-sel"></select>
        </div>
    </div>

    <div id="funnel-container">
        <div id="tooltip"></div>
    </div>
</div>

<script>
// Visual configuration
const margin = {top: 20, right: 220, bottom: 20, left: 220},
      width = 900 - margin.left - margin.right,
      height = 550 - margin.top - margin.bottom;

const svg = d3.select("#funnel-container").append("svg")
    .attr("width", "100%")
    .attr("height", "100%")
    .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
    .append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

let dataset = [];

// Fetch data from local CSV
d3.csv("ipeds_panel_2017_2023.csv", d3.autoType).then(data => {
    dataset = data;

    // Initialize selectors
    const schools = [...new Set(data.map(d => d.institution_name))].sort();
    d3.select("#school-list").selectAll("option").data(schools).enter().append("option").attr("value", d => d);

    const years = [...new Set(data.map(d => d.year))].sort((a,b) => b-a);
    d3.select("#year-sel").selectAll("option").data(years).enter().append("option").text(d => d);

    // Default: UIUC
    d3.select("#school-search").property("value", "University of Illinois Urbana-Champaign");
    
    d3.selectAll("#school-search, #year-sel").on("input", renderFunnel);
    renderFunnel();
});

function renderFunnel() {
    const school = d3.select("#school-search").property("value");
    const year = +d3.select("#year-sel").property("value");
    const d = dataset.find(row => row.institution_name === school && row.year === year);

    svg.selectAll("*").remove();

    // Data verification
    if (!d || !d.applicants_total || !d.admissions_total || !d.enrolled_total) {
        d3.select("#funnel-container").append("div").attr("class", "no-data").text("Required admission fields missing for this selection.");
        return;
    }

    const stages = [
        { label: "APPLICANTS", value: d.applicants_total, color: "#2563eb" },
        { label: "ADMISSIONS", value: d.admissions_total, color: "#4f46e5" },
        { label: "ENROLLED", value: d.enrolled_total, color: "#7c3aed" }
    ];

    const segmentHeight = height / stages.length;
    const maxVal = stages[0].value;
    const funnelWidth = d3.scaleLinear().domain([0, maxVal]).range([0, width]);

    stages.forEach((s, i) => {
        const topW = funnelWidth(s.value);
        const nextVal = (i < stages.length - 1) ? stages[i+1].value : s.value * 0.75;
        const bottomW = funnelWidth(nextVal);

        const yTop = i * segmentHeight;
        const yBottom = (i + 1) * segmentHeight;

        // Draw Trapezoid segment
        const points = [
            [width/2 - topW/2, yTop],
            [width/2 + topW/2, yTop],
            [width/2 + bottomW/2, yBottom - 20],
            [width/2 - bottomW/2, yBottom - 20]
        ];

        svg.append("path")
            .attr("class", "funnel-path")
            .attr("d", d3.line()(points) + "Z")
            .attr("fill", s.color)
            .on("mouseover", (event) => {
                d3.select("#tooltip").style("display", "block")
                    .html(`<strong>${s.label}</strong><br>Value: ${s.value.toLocaleString()}`);
            })
            .on("mousemove", event => {
                const container = document.getElementById('funnel-container').getBoundingClientRect();
                d3.select("#tooltip").style("left", (event.clientX - container.left + 15) + "px")
                                     .style("top", (event.clientY - container.top - 15) + "px");
            })
            .on("mouseout", () => d3.select("#tooltip").style("display", "none"));

        // Labels
        svg.append("text").attr("class", "stage-label").attr("x", -20).attr("y", yTop + segmentHeight/2).attr("text-anchor", "end").text(s.label);
        svg.append("text").attr("class", "count-label").attr("x", width + 20).attr("y", yTop + segmentHeight/2).attr("text-anchor", "start").text(s.value.toLocaleString());

        // High Contrast Rate Badges
        if (i < stages.length - 1) {
            const rateValue = ((stages[i+1].value / s.value) * 100).toFixed(1);
            const rateName = (i === 0) ? "Admission Rate" : "Enrollment Yield";
            const badgeY = yBottom - 10;

            // Badge Background
            svg.append("rect")
                .attr("class", "badge-bg")
                .attr("x", width/2 - 60)
                .attr("y", badgeY - 15)
                .attr("width", 120)
                .attr("height", 30);

            // Rate Percentage
            svg.append("text")
                .attr("class", "badge-text")
                .attr("x", width/2)
                .attr("y", badgeY + 5)
                .text(`${rateValue}%`);

            // Metric Description Label
            svg.append("text")
                .attr("class", "badge-desc")
                .attr("x", width/2)
                .attr("y", badgeY - 20)
                .text(rateName);
        }
    });
}
</script>
</body>
</html>
