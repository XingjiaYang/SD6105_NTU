<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPEDS Data Distribution Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --primary: #3498db;
      --bg: #f4f7f9;
      --card: #ffffff;
      --text: #2c3e50;
      --muted: #95a5a6;
      --border: #edf2f7;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .main-container {
      width: 100%;
      max-width: 1000px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.06);
      padding: 40px;
    }

    header { text-align: center; margin-bottom: 30px; }
    h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .tagline { color: var(--muted); font-size: 14px; margin-top: 8px; }

    .controls {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }

    .control-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #7f8c8d; letter-spacing: 0.5px; }

    select {
      padding: 12px 18px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: white;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      min-width: 200px;
      transition: all 0.3s;
    }
    select:hover { border-color: var(--primary); }

    .chart-wrapper { width: 100%; display: flex; justify-content: center; position: relative; }
    
    .bar { fill: var(--primary); opacity: 0.8; transition: all 0.3s ease; }
    .bar:hover { opacity: 1; fill: #2980b9; }
    
    .axis-text { font-size: 11px; fill: #7f8c8d; }
    .grid line { stroke: #f0f0f0; stroke-opacity: 0.7; }

    #tooltip {
      position: absolute;
      background: rgba(44, 62, 80, 0.95);
      color: white;
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 1000;
      box-shadow: 0 8px 15px rgba(0,0,0,0.15);
    }

    /* Bottom */
    .stats-row {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .stat-card {
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #f1f5f9;
    }
    .stat-val { display: block; font-size: 20px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 10px; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  </style>
</head>
<body>

<div class="main-container">
  <header>
    <h1>Distribution Explorer</h1>
    <div class="tagline">Dynamic Histogram for IPEDS Panel Data</div>
    <div id="status" style="font-size: 11px; margin-top: 10px; color: var(--muted);">Loading CSV...</div>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>Target Variable</label>
      <select id="column-selector"></select>
    </div>
    <div class="control-group">
      <label>Academic Year</label>
      <select id="year-selector"></select>
    </div>
  </div>

  <div class="chart-wrapper">
    <div id="histogram-container"></div>
    <div id="tooltip"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <span id="stat-mean" class="stat-val">-</span>
      <span class="stat-label">Mean</span>
    </div>
    <div class="stat-card">
      <span id="stat-median" class="stat-val">-</span>
      <span class="stat-label">Median</span>
    </div>
    <div class="stat-card">
      <span id="stat-count" class="stat-val">-</span>
      <span class="stat-label">Institutions (N)</span>
    </div>
  </div>
</div>

<script>
  let rawData = [];
  const margin = {top: 20, right: 30, bottom: 50, left: 60};
  const width = 850 - margin.left - margin.right;
  const height = 400 - margin.top - margin.bottom;

  // Define a function that if it is NA
  function isNumeric(col, data) {
    const sample = data.slice(0, 50).map(d => d[col]);
    return sample.every(v => v === "" || !isNaN(parseFloat(v)));
  }

  async function init() {
    try {
      rawData = await d3.csv("./ipeds_panel_2017_2023.csv");
      
      const colSelector = d3.select("#column-selector");
      const yearSelector = d3.select("#year-selector");

      const numericCols = rawData.columns.filter(col => isNumeric(col, rawData));
      colSelector.selectAll("option")
        .data(numericCols).enter().append("option")
        .attr("value", d => d).text(d => d.replace(/_/g, ' ').toUpperCase());

      const years = [...new Set(rawData.map(d => d.year))].sort((a,b) => b-a);
      yearSelector.selectAll("option")
        .data(years).enter().append("option")
        .attr("value", d => d).text(d => `Year: ${d}`);

      colSelector.property("value", "admission_rate");
      d3.select("#status").text(`Successfully loaded ${rawData.length} records. Ready.`);
      
      update();

      colSelector.on("change", update);
      yearSelector.on("change", update);

    } catch (e) {
      d3.select("#status").text("Error: Could not find CSV. Please use a local server (e.g., python -m http.server).").style("color", "#e74c3c");
    }
  }

  function update() {
    const colName = d3.select("#column-selector").property("value");
    const selectedYear = d3.select("#year-selector").property("value");

    // Data Clean
    const filteredValues = rawData
      .filter(d => d.year === selectedYear && d[colName] !== "" && !isNaN(+d[colName]))
      .map(d => +d[colName]);

    if (filteredValues.length === 0) {
      d3.select("#histogram-container").html("<p style='text-align:center; padding:50px;'>No data available for this selection.</p>");
      return;
    }

    render(filteredValues, colName);
    updateStats(filteredValues);
  }

  function updateStats(vals) {
    d3.select("#stat-mean").text(d3.mean(vals).toFixed(2));
    d3.select("#stat-median").text(d3.median(vals).toFixed(2));
    d3.select("#stat-count").text(vals.length.toLocaleString());
  }

  function render(data, label) {
    const container = d3.select("#histogram-container");
    container.html("");

    const svg = container.append("svg")
      .attr("width", width + margin.left + margin.right)
      .attr("height", height + margin.top + margin.bottom)
      .append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear()
      .domain(d3.extent(data)).nice()
      .range([0, width]);

    const bins = d3.bin()
      .domain(x.domain())
      .thresholds(x.ticks(40))(data);

    const y = d3.scaleLinear()
      .domain([0, d3.max(bins, d => d.length)]).nice()
      .range([height, 0]);

    svg.append("g")
      .attr("class", "grid")
      .call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""));

    svg.append("g")
      .attr("transform", `translate(0,${height})`)
      .attr("class", "axis-text")
      .call(d3.axisBottom(x));

    svg.append("g")
      .attr("class", "axis-text")
      .call(d3.axisLeft(y).ticks(5));

    const tooltip = d3.select("#tooltip");

    svg.selectAll("rect")
      .data(bins)
      .enter().append("rect")
      .attr("class", "bar")
      .attr("x", d => x(d.x0) + 1)
      .attr("width", d => Math.max(0, x(d.x1) - x(d.x0) - 1))
      .attr("y", height)
      .attr("height", 0)
      .on("mouseover", (e, d) => {
        tooltip.style("display", "block")
          .html(`<strong>Range:</strong> ${d.x0.toFixed(2)} - ${d.x1.toFixed(2)}<br><strong>Count:</strong> ${d.length}`);
      })
      .on("mousemove", (e) => {
        const bounds = document.querySelector('.chart-wrapper').getBoundingClientRect();
        tooltip.style("left", (e.clientX - bounds.left + 15) + "px")
               .style("top", (e.clientY - bounds.top - 15) + "px");
      })
      .on("mouseout", () => tooltip.style("display", "none"))
      .transition().duration(800)
      .attr("y", d => y(d.length))
      .attr("height", d => height - y(d.length));

    svg.append("text")
      .attr("text-anchor", "middle")
      .attr("x", width/2)
      .attr("y", height + 40)
      .style("font-size", "12px")
      .style("font-weight", "700")
      .text(label.replace(/_/g, ' ').toUpperCase());
  }

  init();
</script>
</body>
</html>
