<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>US Colleges Map: Interactive & Data-Driven</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .card { max-width: 1050px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #dcdfe6; cursor: pointer; background: white; }
        
        /* Interactive map container styling */
        #map-container { position: relative; border: 1px solid #eee; border-radius: 8px; background: #fafafa; overflow: hidden; height: 600px; cursor: grab; }
        #map-container:active { cursor: grabbing; }
        
        /* Map Layers */
        .state { fill: #ecf0f1; stroke: #ffffff; stroke-width: 1px; cursor: pointer; transition: fill 0.2s; }
        .state:hover { fill: #bdc3c7; }
        
        /* Dots styling - slight transparency for density feeling */
        .dot { stroke: #fff; stroke-width: 0.5px; opacity: 0.75; pointer-events: all; }
        .dot:hover { stroke: #2c3e50; stroke-width: 1.5px; opacity: 1; }
        
        #tooltip { position: absolute; background: rgba(30, 41, 59, 0.95); color: white; padding: 12px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 1000; line-height: 1.5; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ui-hint { text-align: center; font-size: 12px; color: #7f8c8d; margin-top: 10px; font-style: italic; }
        .legend { display: flex; justify-content: center; gap: 25px; margin-top: 15px; font-size: 13px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h2>US Higher Education Explorer</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>1. Academic Year</label>
            <select id="year-sel"></select>
        </div>
        <div class="control-group">
            <label>2. Focus State (Fly To)</label>
            <select id="state-sel">
                <option value="all">US Total (All States)</option>
            </select>
        </div>
    </div>

    <div id="map-container">
        <div id="tooltip"></div>
    </div>
    
    <div class="ui-hint">💡 Scroll to Zoom. Click and Drag to Pan. Double Click background to Reset.</div>
    
    <div class="legend">
        <span style="color: #3498db;">● Public</span>
        <span style="color: #e67e22;">● Private</span>
    </div>
</div>

<script>
const width = 1000, height = 600;
const svg = d3.select("#map-container").append("svg")
    .attr("viewBox", `0 0 ${width} ${height}`)
    .attr("width", "100%")
    .attr("height", "100%");

// D3 Zoom for Pan & Scroll
const zoom = d3.zoom()
    .scaleExtent([1, 8])
    .on("zoom", handleZoom);

svg.call(zoom);
svg.on("dblclick.zoom", resetMap);

const g = svg.append("g"); 
const projection = d3.geoAlbersUsa().scale(1150).translate([width / 2, height / 2]);
const pathGen = d3.geoPath().projection(projection);

let usTopoData, collegeJsonData;
let currentTransform = d3.zoomIdentity;

// 核心改进：同时异步加载 地图底图 JSON 和 外部学校数据 data.json
Promise.all([
    d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"),
    d3.json("data.json") // 加载外部 JSON
]).then(([topology, collegeData]) => {
    usTopoData = topology;
    collegeJsonData = collegeData;

    // 1. 初始化年份选择器 (从 JSON 的 key 中动态获取)
    const years = Object.keys(collegeJsonData).sort((a, b) => b - a);
    d3.select("#year-sel").selectAll("option").data(years).enter().append("option").text(d => d);

    // 2. 初始化州选择器
    const states = topojson.feature(topology, topology.objects.states).features;
    states.sort((a, b) => a.properties.name.localeCompare(b.properties.name));
    d3.select("#state-sel").selectAll(".state-opt")
        .data(states).enter().append("option")
        .attr("class", "state-opt")
        .attr("value", d => d.properties.name)
        .text(d => d.properties.name);

    // 3. 初次绘制
    drawMap();

    // 4. 事件监听
    d3.select("#year-sel").on("change", updateDots);
    d3.select("#state-sel").on("change", function() {
        const val = this.value;
        if (val === "all") resetMap();
        else flyToState(val);
    });
});

// 处理拖拽和缩放的动态表现
function handleZoom(event) {
    currentTransform = event.transform;
    g.attr("transform", currentTransform);
    
    // 缩放时，动态缩小点的大小，防止糊成一团
    g.selectAll(".dot").attr("r", 3.5 / Math.pow(currentTransform.k, 0.6));
    g.selectAll(".state").style("stroke-width", 1 / currentTransform.k + "px");
}

function drawMap() {
    const states = topojson.feature(usTopoData, usTopoData.objects.states).features;

    // 绘制州底图
    g.selectAll(".state").data(states).enter().append("path")
        .attr("class", "state")
        .attr("d", pathGen)
        .on("click", (e, d) => {
            d3.select("#state-sel").property("value", d.properties.name);
            flyToState(d.properties.name);
        });

    updateDots();
}

// 根据年份动态更新散点
function updateDots() {
    const selectedYear = d3.select("#year-sel").property("value");
    const currentYearData = collegeJsonData[selectedYear] || [];
    
    // 过滤掉没有合法经纬度的数据
    const validPoints = currentYearData.filter(d => d.lon && d.lat && projection([d.lon, d.lat]));

    g.selectAll(".dot").data(validPoints, d => d.n)
        .join(
            enter => enter.append("circle").attr("class", "dot")
                .attr("cx", d => projection([d.lon, d.lat])[0])
                .attr("cy", d => projection([d.lon, d.lat])[1])
                .attr("r", 0),
            update => update,
            exit => exit.remove()
        )
        .transition().duration(600)
        .attr("cx", d => projection([d.lon, d.lat])[0])
        .attr("cy", d => projection([d.lon, d.lat])[1])
        .attr("r", 3.5 / Math.pow(currentTransform.k, 0.6))
        // 匹配你的 JSON 数据: "Public" vs "Private"
        .attr("fill", d => d.t === "Public" ? "#3498db" : "#e67e22");

    // Tooltip 交互
    g.selectAll(".dot")
        .on("mouseover", (e, d) => {
            const rateText = d.r > 0 ? (d.r * 100).toFixed(1) + "%" : "Open / N/A";
            d3.select("#tooltip").style("display", "block")
                .html(`<strong>${d.n}</strong><br>
                       <span style="color:#cbd5e0">${d.s} | ${d.t}</span><hr style="border:0;border-top:1px solid #4a5568;margin:5px 0">
                       Admission Rate: ${rateText}`);
        })
        .on("mousemove", e => {
            const bounds = document.getElementById('map-container').getBoundingClientRect();
            d3.select("#tooltip")
                .style("left", (e.clientX - bounds.left + 15) + "px")
                .style("top", (e.clientY - bounds.top - 15) + "px");
        })
        .on("mouseout", () => d3.select("#tooltip").style("display", "none"));
}

// 飞向特定州 (配合 Zoom 引擎)
function flyToState(stateName) {
    const feature = topojson.feature(usTopoData, usTopoData.objects.states).features.find(d => d.properties.name === stateName);
    if (!feature) return;

    const bounds = pathGen.bounds(feature);
    const dx = bounds[1][0] - bounds[0][0];
    const dy = bounds[1][1] - bounds[0][1];
    const x = (bounds[0][0] + bounds[1][0]) / 2;
    const y = (bounds[0][1] + bounds[1][1]) / 2;
    
    // 计算恰好容纳该州的缩放比例
    const scale = Math.max(1, Math.min(8, 0.85 / Math.max(dx / width, dy / height)));
    const translate = [width / 2 - scale * x, height / 2 - scale * y];

    svg.transition().duration(800).call(
        zoom.transform, 
        d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
    );
}

function resetMap() {
    d3.select("#state-sel").property("value", "all");
    svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity);
}
</script>
</body>
</html>
