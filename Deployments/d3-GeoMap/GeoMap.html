<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>US Colleges & CC Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .card { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #dcdfe6; cursor: pointer; }
        #map-container { position: relative; border: 1px solid #eee; border-radius: 8px; background: #fafafa; overflow: hidden; height: 550px; }
        .state { fill: #ecf0f1; stroke: #fff; stroke-width: 1; transition: 0.3s; }
        .state:hover { fill: #bdc3c7; cursor: pointer; }
        .dot { stroke: #fff; stroke-width: 0.2; opacity: 0.7; }
        #tooltip { position: absolute; background: rgba(44, 62, 80, 0.9); color: white; padding: 10px; border-radius: 4px; font-size: 12px; pointer-events: none; display: none; z-index: 10; }
        .legend { display: flex; justify-content: center; gap: 30px; margin-top: 20px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
<div class="card">
    <h2>US Higher Education: 2-Year & 4-Year Institutions</h2>
    <div class="controls">
        <div>Year: <select id="year-sel"></select></div>
        <div>State: <select id="state-sel"><option value="all">-- Show All --</option></select></div>
    </div>
    <div id="map-container"><div id="tooltip"></div></div>
    <div class="legend">
        <span style="color: #3498db;">● Public / CC</span>
        <span style="color: #e67e22;">● Private</span>
    </div>
</div>

<script>
const width = 960, height = 550;
const svg = d3.select("#map-container").append("svg").attr("viewBox", [0, 0, width, height]);
const g = svg.append("g");
const projection = d3.geoAlbersUsa().scale(1100).translate([width / 2, height / 2]);
const path = d3.geoPath().projection(projection);

let fullData, statesData;

// Loading Data
Promise.all([
    d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"),
    d3.json("data.json")
]).then(([topology, data]) => {
    statesData = topojson.feature(topology, topology.objects.states);
    fullData = data;

    // Initial Year choose
    const years = Object.keys(data).sort((a,b) => b-a);
    d3.select("#year-sel").selectAll("option").data(years).enter().append("option").text(d => d).attr("value", d => d);

    // Plot base map
    g.append("g").selectAll("path").data(statesData.features).join("path")
        .attr("class", "state").attr("d", path)
        .on("click", (e, d) => doZoom(d.properties.name));

    // State
    const statesList = statesData.features.map(d => d.properties.name).sort();
    d3.select("#state-sel").selectAll(".opt").data(statesList).enter().append("option").attr("class","opt").text(d => d);

    updateMap();

    d3.select("#year-sel").on("change", updateMap);
    d3.select("#state-sel").on("change", function() { doZoom(this.value); });
});

function updateMap() {
    const year = d3.select("#year-sel").property("value");
    const colleges = fullData[year].filter(d => projection([d.lon, d.lat]));

    const dots = g.selectAll(".dot").data(colleges, d => d.n);

    dots.join(
        enter => enter.append("circle").attr("class", "dot")
            .attr("cx", d => projection([d.lon, d.lat])[0])
            .attr("cy", d => projection([d.lon, d.lat])[1])
            .attr("r", 0).attr("fill", d => d.t === 'Public' ? '#3498db' : '#e67e22')
            .call(e => e.transition().duration(500).attr("r", 3)),
        update => update.transition().duration(500)
            .attr("cx", d => projection([d.lon, d.lat])[0])
            .attr("cy", d => projection([d.lon, d.lat])[1]),
        exit => exit.transition().duration(300).attr("r", 0).remove()
    )
    .on("mouseover", (e, d) => {
        d3.select("#tooltip").style("display", "block")
            .html(`<strong>${d.n}</strong><br>State: ${d.s}<br>Rate: ${d.r > 0 ? (d.r * 100).toFixed(1) + "%" : "Open/NA"}`);
    })
    .on("mousemove", e => {
        const bounds = document.getElementById('map-container').getBoundingClientRect();
        d3.select("#tooltip").style("left", (e.clientX - bounds.left + 10) + "px").style("top", (e.clientY - bounds.top - 10) + "px");
    })
    .on("mouseout", () => d3.select("#tooltip").style("display", "none"));
}

function doZoom(name) {
    d3.select("#state-sel").property("value", name);
    if (name === "all") {
        g.transition().duration(750).attr("transform", "");
        g.selectAll(".dot").transition().duration(750).attr("r", 3);
        return;
    }
    const feature = statesData.features.find(f => f.properties.name === name);
    const [[x0, y0], [x1, y1]] = path.bounds(feature);
    const k = Math.min(8, 0.8 / Math.max((x1 - x0) / width, (y1 - y0) / height));
    g.transition().duration(750).attr("transform", `translate(${width/2},${height/2})scale(${k})translate(${-(x0+x1)/2},${-(y0+y1)/2})`);
    g.selectAll(".dot").transition().duration(750).attr("r", 3/k);
}
</script>
</body>
</html>
