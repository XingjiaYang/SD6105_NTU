<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IPEDS GeoMap</title>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- TopoJSON client -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    h1 {
      margin: 20px;
      font-size: 24px;
    }

    #chart {
      margin: 20px;
      background: white;
      border: 1px solid #ddd;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      visibility: hidden;
      max-width: 280px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>IPEDS Institutions GeoMap</h1>
  <svg id="chart" width="1200" height="700"></svg>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const width = 1200;
    const height = 700;

    const svg = d3.select("#chart");
    const tooltip = d3.select("#tooltip");

    Promise.all([
      d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"),
      d3.csv("IPEDS_data.csv", d => ({
        name: d["Name"],
        lon: +d["Longitude location of institution"],
        lat: +d["Latitude location of institution"],
        degree: d["Highest degree offered"],
        county: d["County name"],
        zip: d["ZIP code"],
        year: d["year"]
      }))
    ]).then(([us, schools]) => {
      // 把 TopoJSON 转成 GeoJSON
      const states = topojson.feature(us, us.objects.states);

      // 只保留经纬度有效的数据
      schools = schools.filter(d =>
        !isNaN(d.lon) &&
        !isNaN(d.lat) &&
        d.name
      );

      // 建投影：美国地图最方便直接用 geoAlbersUsa
      const projection = d3.geoAlbersUsa()
        .fitSize([width, height], states);

      const path = d3.geoPath(projection);

      // 画州边界
      svg.append("g")
        .selectAll("path")
        .data(states.features)
        .join("path")
        .attr("d", path)
        .attr("fill", "#e6e6e6")
        .attr("stroke", "#999")
        .attr("stroke-width", 0.8);

      // 画学校点
      svg.append("g")
        .selectAll("circle")
        .data(schools.filter(d => projection([d.lon, d.lat]) !== null))
        .join("circle")
        .attr("cx", d => projection([d.lon, d.lat])[0])
        .attr("cy", d => projection([d.lon, d.lat])[1])
        .attr("r", 2.5)
        .attr("fill", "steelblue")
        .attr("opacity", 0.6)
        .on("mouseover", function(event, d) {
          d3.select(this)
            .attr("r", 5)
            .attr("opacity", 1);

          tooltip
            .style("visibility", "visible")
            .html(`
              <strong>${d.name}</strong><br/>
              Degree: ${d.degree || "N/A"}<br/>
              County: ${d.county || "N/A"}<br/>
              ZIP: ${d.zip || "N/A"}<br/>
              Year: ${d.year || "N/A"}<br/>
              Lat/Lon: ${d.lat}, ${d.lon}
            `);
        })
        .on("mousemove", function(event) {
          tooltip
            .style("top", (event.pageY + 12) + "px")
            .style("left", (event.pageX + 12) + "px");
        })
        .on("mouseout", function() {
          d3.select(this)
            .attr("r", 2.5)
            .attr("opacity", 0.6);

          tooltip.style("visibility", "hidden");
        });

      // 标题说明
      svg.append("text")
        .attr("x", 20)
        .attr("y", 30)
        .attr("font-size", 16)
        .attr("font-weight", "bold")
        .text(`Institutions plotted: ${schools.filter(d => projection([d.lon, d.lat]) !== null).length}`);
    }).catch(err => {
      console.error("Error loading data:", err);
      alert("加载失败，按 F12 打开 Console 看报错。");
    });
  </script>
</body>
</html>
