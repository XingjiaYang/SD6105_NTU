<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectivity Browser | US Higher Ed</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #e67e22;
            --bg: #f4f7f9;
            --card: #ffffff;
            --text: #2c3e50;
            --border: #edf2f7;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px 20px;
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.06);
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .tagline { color: #95a5a6; font-size: 14px; margin-top: 8px; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #7f8c8d; letter-spacing: 0.5px; }

        select {
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: white;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 180px;
        }
        select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1); }

        #chart-container {
            width: 100%;
            overflow-y: auto;
            max-height: 650px; /* Scrollable for large states */
            padding-right: 10px;
        }

        .bar:hover { opacity: 0.8; cursor: crosshair; }
        .axis-label { font-size: 11px; font-weight: 500; fill: #7f8c8d; }
        .y-axis path, .y-axis line { display: none; }
        .x-axis path { stroke: var(--border); }

        #tooltip {
            position: absolute;
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .stat-summary {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 15px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Admission Rate Browser</h1>
        <div class="tagline">Ranked Institutional Selectivity by State</div>
        <div id="status" style="font-size: 11px; color: #95a5a6; margin-top: 10px;">Loading Dataset...</div>
    </header>

    <div class="controls">
        <div class="control-group">
            <label>Academic Year</label>
            <select id="year-select"></select>
        </div>
        <div class="control-group">
            <label>U.S. State</label>
            <select id="state-select"></select>
        </div>
    </div>

    <div id="summary-info" class="stat-summary"></div>
    <div id="chart-container"></div>
    <div id="tooltip"></div>
</div>

<script>
    let rawData = [];
    const margin = {top: 10, right: 60, bottom: 40, left: 280};
    
    // Configurable state mapping
    const states = {"AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut","DE":"Delaware","DC":"District of Columbia","FL":"Florida","GA":"Georgia","HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire","NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina","ND":"North Dakota","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvania","RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington","WV":"West Virginia","WI":"Wisconsin","WY":"Wyoming"};

    async function init() {
        try {
            rawData = await d3.csv("./ipeds_panel_2017_2023.csv");
            
            // Setup Year Select
            const years = [...new Set(rawData.map(d => d.year))].sort((a,b) => b-a);
            d3.select("#year-select").selectAll("option")
                .data(years).enter().append("option").text(d => d).attr("value", d => d);

            // Setup State Select
            const stateEntries = Object.entries(states).sort((a,b) => a[1].localeCompare(b[1]));
            d3.select("#state-select").selectAll("option")
                .data(stateEntries).enter().append("option")
                .text(d => d[1]).attr("value", d => d[0]);

            // Default to Illinois (UIUC's home!)
            d3.select("#state-select").property("value", "IL");

            d3.select("#status").text(`Successfully synchronized ${rawData.length} records.`);
            update();

        } catch (e) {
            d3.select("#status").text("Error: CSV file not found. Run via local server.").style("color", "#e74c3c");
        }
    }

    function update() {
        const year = d3.select("#year-select").property("value");
        const state = d3.select("#state-select").property("value");

        // Filter and Sort: Admission rate in CSV is 0-100 scale
        let filtered = rawData.filter(d => d.year === year && d.state_abbr === state && d.admission_rate && +d.admission_rate > 0)
            .map(d => ({
                name: d.institution_name,
                rate: +d.admission_rate / 100,
                control: d.control_label.includes("Public") ? "Public" : "Private"
            }))
            .sort((a, b) => a.rate - b.rate); // Lowest rate at top

        d3.select("#summary-info").text(`Showing ${filtered.length} institutions sorted by selectivity`);

        renderChart(filtered);
    }

    function renderChart(data) {
        const container = d3.select("#chart-container");
        container.html("");

        const width = container.node().getBoundingClientRect().width - margin.left - margin.right;
        const barHeight = 25;
        const height = data.length * barHeight;

        const svg = container.append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleLinear().domain([0, 1]).range([0, width]);
        const y = d3.scaleBand().domain(data.map(d => d.name)).range([0, height]).padding(0.2);

        // X Axis
        svg.append("g")
            .attr("transform", `translate(0,${height})`)
            .attr("class", "x-axis")
            .call(d3.axisBottom(x).ticks(5).tickFormat(d3.format(".0%")));

        // Y Axis (Names)
        svg.append("g")
            .attr("class", "y-axis")
            .call(d3.axisLeft(y));

        // Bars
        svg.selectAll(".bar")
            .data(data)
            .enter()
            .append("rect")
            .attr("class", "bar")
            .attr("y", d => y(d.name))
            .attr("x", 0)
            .attr("height", y.bandwidth())
            .attr("fill", d => d.control === "Public" ? "#3498db" : "#e67e22")
            .attr("width", 0) // Animation start
            .on("mouseover", (e, d) => {
                d3.select("#tooltip")
                    .style("display", "block")
                    .html(`<strong>${d.name}</strong><br>Admission Rate: ${(d.rate*100).toFixed(1)}%<br>Type: ${d.control}`);
            })
            .on("mousemove", (e) => {
                d3.select("#tooltip")
                    .style("left", (e.pageX + 15) + "px")
                    .style("top", (e.pageY - 15) + "px");
            })
            .on("mouseout", () => d3.select("#tooltip").style("display", "none"))
            .transition().duration(800)
            .attr("width", d => x(d.rate));

        // Value Labels
        svg.selectAll(".val-text")
            .data(data)
            .enter()
            .append("text")
            .attr("x", d => x(d.rate) + 5)
            .attr("y", d => y(d.name) + y.bandwidth()/2 + 4)
            .style("font-size", "10px")
            .style("font-weight", "600")
            .style("fill", "#7f8c8d")
            .text(d => (d.rate * 100).toFixed(1) + "%");
    }

    d3.select("#year-select").on("change", update);
    d3.select("#state-select").on("change", update);

    init();
</script>
</body>
</html>
