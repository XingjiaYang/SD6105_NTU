<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>t-SNE Full Data Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --primary: #3498db; --bg: #f4f7f9; --card: #ffffff;
      --text: #2c3e50; --muted: #95a5a6;
    }
    body {
      margin: 0; font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; padding: 40px;
    }
    .card {
      width: 100%; max-width: 1200px; background: var(--card);
      border-radius: 24px; box-shadow: 0 15px 45px rgba(0,0,0,0.06);
      padding: 40px; position: relative;
    }
    header { text-align: center; margin-bottom: 30px; }
    h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }

    .controls {
      display: flex; gap: 20px; align-items: flex-end;
      margin-bottom: 30px; padding: 25px;
      background: #f8fafc; border-radius: 16px; border: 1px solid #edf2f7;
    }
    .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
    select, input {
      padding: 12px; border-radius: 10px; border: 1px solid #ddd;
      font-size: 14px; outline: none; background: white;
    }
    button {
      background: var(--primary); color: white; border: none;
      padding: 12px 30px; border-radius: 10px; font-weight: 700;
      cursor: pointer; transition: all 0.3s;
    }
    button:hover { background: #2980b9; transform: translateY(-1px); }
    button:disabled { background: #bdc3c7; cursor: not-allowed; }

    #scatter { 
      width: 100%; height: 650px; background: #fafafa; 
      border-radius: 16px; border: 1px solid #eee; overflow: hidden; 
    }
    
    #loader {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.85); display: none;
      flex-direction: column; justify-content: center; align-items: center; 
      z-index: 100; border-radius: 24px;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .dot { stroke-width: 0.5px; opacity: 0.7; transition: opacity 0.2s; }
    .dot:hover { opacity: 1; stroke-width: 2px; stroke: #333; }
    
    #tooltip {
      position: absolute; background: rgba(44, 62, 80, 0.95); color: white;
      padding: 10px 15px; border-radius: 8px; font-size: 12px; 
      pointer-events: none; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div class="card">
  <div id="loader">
    <div class="spinner"></div>
    <div style="font-weight: 700;">Computing High-Dimensional Manifold...</div>
    <div style="font-size: 12px; color: var(--muted); margin-top: 5px;">This may take 10-30 seconds for full dataset.</div>
  </div>

  <header>
    <h1>t-SNE Dimensionality Explorer</h1>
    <p style="color: var(--muted); font-size: 14px;">Full Year Data Visualizer (No Sampling)</p>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>Target Year</label>
      <select id="year-select"></select>
    </div>
    <div class="control-group">
      <label>Color Logic (Category)</label>
      <select id="label-select"></select>
    </div>
    <div class="control-group">
      <label>Perplexity</label>
      <input type="number" id="perplexity" value="30" min="5" max="100">
    </div>
    <button id="run-btn">Generate Full Analysis</button>
  </div>

  <div id="scatter"></div>
  <div id="tooltip"></div>
</div>

<script>
  const API_BASE = "/tsne/api";

  async function loadMeta() {
    try {
      const resp = await fetch(`${API_BASE}/get_metadata`);
      const meta = await resp.json();
      
      d3.select("#year-select").selectAll("option")
        .data(meta.years).enter().append("option")
        .text(d => d).attr("value", d => d);

      d3.select("#label-select").selectAll("option")
        .data(meta.columns).enter().append("option")
        .text(d => d).attr("value", d => d);
      
      d3.select("#label-select").property("value", "control_label");
    } catch (e) {
      alert("Backend offline. Please run 'python app.py' first.");
    }
  }

  d3.select("#run-btn").on("click", async () => {
    const payload = {
      year: d3.select("#year-select").property("value"),
      label_col: d3.select("#label-select").property("value"),
      perplexity: d3.select("#perplexity").property("value"),
      seed: 42
    };

    const btn = d3.select("#run-btn");
    btn.property("disabled", true).text("Processing...");
    d3.select("#loader").style("display", "flex");

    try {
      const resp = await fetch(`${API_BASE}/run_tsne`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const result = await resp.json();
      if (result.error) throw new Error(result.error);
      draw(result.data);
    } catch (e) {
      alert("Error: " + e.message);
    } finally {
      d3.select("#loader").style("display", "none");
      btn.property("disabled", false).text("Generate Full Analysis");
    }
  });

  function draw(points) {
    const container = d3.select("#scatter");
    container.select("svg").remove();
    
    const width = container.node().clientWidth, height = 650;
    const svg = container.append("svg")
      .attr("viewBox", [0, 0, width, height])
      .attr("width", width).attr("height", height);
    
    const g = svg.append("g");

    const x = d3.scaleLinear().domain(d3.extent(points, d => d.x)).range([50, width-50]);
    const y = d3.scaleLinear().domain(d3.extent(points, d => d.y)).range([height-50, 50]);
    
    const color = d3.scaleOrdinal(d3.schemeCategory10);

    svg.call(d3.zoom().scaleExtent([0.5, 20]).on("zoom", (e) => g.attr("transform", e.transform)));

    g.selectAll("circle")
      .data(points)
      .join("circle")
      .attr("class", "dot")
      .attr("cx", d => x(d.x))
      .attr("cy", d => y(d.y))
      .attr("r", 3.5)
      .attr("fill", d => color(d.label))
      .attr("stroke", "#fff")
      .on("mouseover", (e, d) => {
        d3.select("#tooltip")
          .style("display", "block")
          .html(`<strong>${d.name}</strong><br>Category: ${d.label}`);
      })
      .on("mousemove", (e) => {
        d3.select("#tooltip")
          .style("left", (e.pageX + 15) + "px")
          .style("top", (e.pageY - 15) + "px");
      })
      .on("mouseout", () => d3.select("#tooltip").style("display", "none"));
  }

  loadMeta();
</script>
</body>
</html>
