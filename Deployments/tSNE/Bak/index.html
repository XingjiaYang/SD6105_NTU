<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Python-Powered t-SNE Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --primary: #3498db; --bg: #f4f7f9; --card: #ffffff;
      --text: #2c3e50; --muted: #95a5a6;
    }
    body {
      margin: 0; font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; padding: 40px;
    }
    .card {
      width: 100%; max-width: 1200px; background: var(--card);
      border-radius: 24px; box-shadow: 0 15px 45px rgba(0,0,0,0.06);
      padding: 40px; position: relative;
    }
    header { text-align: center; margin-bottom: 30px; }
    h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    
    /* GeoMap Style Controls */
    .controls {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px; background: #fafbfc; padding: 25px;
      border-radius: 16px; border: 1px solid #f0f0f0; margin-bottom: 30px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
    select, input {
      padding: 10px; border-radius: 8px; border: 1px solid #dfe6e9;
      font-size: 14px; outline: none;
    }
    button {
      grid-column: 1 / -1; padding: 12px; background: var(--primary);
      color: white; border: none; border-radius: 10px;
      font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    button:hover { background: #2980b9; transform: translateY(-1px); }

    .viz-area {
      height: 600px; border: 1px solid #f0f0f0; border-radius: 16px;
      position: relative; overflow: hidden; background: white;
    }
    #tooltip {
      position: absolute; background: rgba(33,47,61,0.98); color: white;
      padding: 10px; border-radius: 8px; font-size: 12px;
      display: none; pointer-events: none; z-index: 100;
    }
    #loader {
      position: absolute; inset: 0; background: rgba(255,255,255,0.8);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; z-index: 200; backdrop-filter: blur(4px);
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #f3f3f3;
      border-top: 4px solid var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div id="loader"><div class="spinner"></div><p>Python is crunching data...</p></div>
  <header><h1>t-SNE Deep Explorer</h1></header>

  <div class="controls">
    <div class="field">
      <label>Data Mode</label>
      <select id="mode"><option value="full">Full Dataset</option><option value="sampled" selected>Sampled</option></select>
    </div>
    <div class="field">
      <label>Sample Size</label>
      <input type="number" id="size" value="500">
    </div>
    <div class="field">
      <label>Perplexity</label>
      <input type="number" id="perp" value="30">
    </div>
    <div class="field">
      <label>Random Seed</label>
      <input type="number" id="seed" value="42">
    </div>
    <div class="field">
      <label>Color By</label>
      <select id="label-col"></select>
    </div>
    <button id="run">Run Python Backend</button>
  </div>

  <div class="viz-area">
    <div id="scatter"></div>
    <div id="tooltip"></div>
  </div>
</div>

<script>
  const API_URL = "/api";

  // Load columns on start
  d3.json(`${API_URL}/get_columns`).then(data => {
    const sel = d3.select("#label-col");
    data.columns.forEach(c => sel.append("option").text(c).attr("value", c));
  });

  d3.select("#run").on("click", async () => {
    d3.select("#loader").style("display", "flex");
    
    const payload = {
      mode: d3.select("#mode").property("value"),
      sample_size: d3.select("#size").property("value"),
      perplexity: d3.select("#perp").property("value"),
      seed: d3.select("#seed").property("value"),
      label_col: d3.select("#label-col").property("value")
    };

    try {
      const resp = await fetch(`${API_URL}/run_tsne`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const result = await resp.json();
      draw(result.points, payload.label_col);
    } catch (e) {
      alert("Backend error. Make sure app.py is running.");
    } finally {
      d3.select("#loader").style("display", "none");
    }
  });

  function draw(points, labelTitle) {
    const container = d3.select("#scatter");
    container.select("svg").remove();
    const width = container.node().clientWidth, height = 600;
    
    const svg = container.append("svg").attr("width", width).attr("height", height);
    const g = svg.append("g");
    
    const x = d3.scaleLinear().domain(d3.extent(points, d => d.x)).range([50, width-50]);
    const y = d3.scaleLinear().domain(d3.extent(points, d => d.y)).range([height-50, 50]);
    const color = d3.scaleOrdinal(d3.schemeTableau10);

    svg.call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)));

    g.selectAll("circle").data(points).enter().append("circle")
      .attr("cx", d => x(d.x)).attr("cy", d => y(d.y)).attr("r", 4)
      .attr("fill", d => color(d.label)).attr("stroke", "#fff").attr("stroke-width", 0.5)
      .on("mouseover", (e, d) => {
        d3.select("#tooltip").style("display", "block")
          .html(`<b>${labelTitle}:</b> ${d.label}`);
      })
      .on("mousemove", (e) => {
        d3.select("#tooltip").style("left", (e.offsetX + 15) + "px")
          .style("top", (e.offsetY - 15) + "px");
      })
      .on("mouseout", () => d3.select("#tooltip").style("display", "none"));
  }
</script>
</body>
</html>
