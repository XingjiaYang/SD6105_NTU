<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Discovery Tool: Parallel Coordinates v3</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .card { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        p.desc { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }

        .controls { 
            display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; 
            background: #f8f9fa; padding: 15px; border-radius: 8px;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ddd; }

        #chart-container { width: 100%; height: 550px; position: relative; }
        
        /* Axis and Tick Styling */
        .axis line, .axis path { stroke: #bdc3c7; }
        .axis text { fill: #2c3e50; font-size: 10px; font-weight: 600; }
        .axis-label { font-size: 11px; font-weight: bold; fill: #34495e; text-anchor: middle; }

        /* Polyline Styling */
        .background path { fill: none; stroke: #e0e0e0; stroke-opacity: 0.12; shape-rendering: crispEdges; }
        .foreground path { fill: none; stroke: #3498db; stroke-opacity: 0.45; stroke-width: 1.2; }
        .foreground path.hidden { display: none; }
        .foreground path.highlighted { stroke: #e67e22; stroke-opacity: 1; stroke-width: 3.5; }

        #tooltip { position: absolute; background: #2c3e50; color: white; padding: 10px 15px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); line-height: 1.4; }
        
        .result-info { margin-top: 15px; font-size: 13px; color: #34495e; font-weight: bold; text-align: right; }
    </style>
</head>
<body>

<div class="card">
    <h2>College Discovery Tool (Enhanced)</h2>
    <p class="desc">Find your ideal college by filtering across academic, financial, and student satisfaction dimensions.</p>
    
    <div class="controls">
        <div class="control-group">
            <label>Academic Year</label>
            <select id="year-sel"></select>
        </div>
        <div class="control-group">
            <label>Institutional Control</label>
            <select id="sector-sel">
                <option value="all">All Sectors</option>
                <option value="Public">Public Only</option>
                <option value="Private">Private Only</option>
            </select>
        </div>
    </div>

    <div id="chart-container">
        <div id="tooltip"></div>
    </div>
    <div class="result-info" id="result-count">Analyzing IPEDS data...</div>
</div>

<script>
// Chart Setup
const margin = {top: 70, right: 50, bottom: 40, left: 50},
      width = 1300 - margin.left - margin.right,
      height = 550 - margin.top - margin.bottom;

const svg = d3.select("#chart-container").append("svg")
    .attr("width", "100%")
    .attr("height", "100%")
    .attr("viewBox", `0 0 ${width + margin.left + margin.right} ${height + margin.top + margin.bottom}`)
    .append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

// Dimension Configuration: 6 Axes total including Retention Rate
const dimensions = [
    { key: "admission_rate", label: "Admission Rate (%)" },
    { key: "sat_math_75th", label: "SAT Math (75th)" },
    { key: "tuition_fees_instate", label: "Tuition (In-State)" },
    { key: "tuition_fees_outstate", label: "Tuition (Out-of-State)" },
    { key: "total_enrollment", label: "Total Enrollment" },
    { key: "retention_rate_ft", label: "Retention Rate (%)" }
];

let x, y = {}, background, foreground, axes;
let fullDataset = [];

// Load CSV directly from local path
d3.csv("ipeds_panel_2017_2023.csv", d3.autoType).then(data => {
    fullDataset = data;

    // Populate Year dropdown
    const years = [...new Set(data.map(d => d.year))].sort((a,b) => b-a);
    d3.select("#year-sel").selectAll("option").data(years).enter().append("option").text(d => d);

    // Initial render
    updateVisualization();

    // Event listeners
    d3.select("#year-sel").on("change", updateVisualization);
    d3.select("#sector-sel").on("change", updateVisualization);
});

/**
 * Main function to handle chart rendering and data updates
 */
function updateVisualization() {
    const activeYear = +d3.select("#year-sel").property("value");
    const sectorFilter = d3.select("#sector-sel").property("value");

    // Filter for chosen year and ensure all 6 metrics exist for the row
    let plotData = fullDataset.filter(d => 
        d.year === activeYear && 
        dimensions.every(dim => d[dim.key] !== null)
    );

    // Apply control filter (Public/Private)
    if (sectorFilter !== "all") {
        plotData = plotData.filter(d => d.control_label.includes(sectorFilter));
    }

    svg.selectAll("*").remove();

    // X scale: Position of vertical axes
    x = d3.scalePoint().range([0, width]).padding(0.4).domain(dimensions.map(d => d.key));

    // Y scales: Linear scale for each individual axis
    dimensions.forEach(dim => {
        y[dim.key] = d3.scaleLinear()
            .domain(d3.extent(plotData, d => d[dim.key]))
            .range([height, 0]);
    });

    // Helper: Generates path string for a school's line
    function drawLine(d) {
        return d3.line()(dimensions.map(dim => [x(dim.key), y[dim.key](d[dim.key])]));
    }

    // Render background context lines
    background = svg.append("g")
        .attr("class", "background")
        .selectAll("path")
        .data(plotData)
        .enter().append("path")
        .attr("d", drawLine);

    // Render interactive foreground lines
    foreground = svg.append("g")
        .attr("class", "foreground")
        .selectAll("path")
        .data(plotData)
        .enter().append("path")
        .attr("d", drawLine)
        .on("mouseover", highlightLine)
        .on("mouseout", unhighlightLine);

    // Create axis groups
    axes = svg.selectAll(".axis")
        .data(dimensions)
        .enter().append("g")
        .attr("class", "axis")
        .attr("transform", d => `translate(${x(d.key)})`)
        .each(function(d) { d3.select(this).call(d3.axisLeft(y[d.key])); })
        .append("text")
        .attr("class", "axis-label")
        .attr("y", -25)
        .text(d => d.label);

    // Attach Brush components for range filtering
    axes.each(function(d) {
        d3.select(this.parentNode).append("g")
            .attr("class", "brush")
            .call(d3.brushY()
                .extent([[-15, 0], [15, height]])
                .on("start brush end", applyRangeFilter)
            );
    });

    setCount(plotData.length);
}

/**
 * Handles mouseover effects and detailed tooltip
 */
function highlightLine(event, d) {
    d3.select(this).classed("highlighted", true).raise();
    d3.select("#tooltip")
        .style("display", "block")
        .html(`
            <strong>${d.institution_name}</strong><br>
            <span style="color:#bdc3c7; font-size:11px;">${d.control_label}</span><hr style="border:0; border-top:1px solid #555; margin:5px 0;">
            SAT Math: ${d.sat_math_75th}<br>
            Retention: ${d.retention_rate_ft}%<br>
            In-State: $${d.tuition_fees_instate.toLocaleString()}
        `);
}

function unhighlightLine() {
    d3.select(this).classed("highlighted", false);
    d3.select("#tooltip").style("display", "none");
}

// Global mouse tracker for smooth tooltip positioning
d3.select("#chart-container").on("mousemove", function(e) {
    const rect = this.getBoundingClientRect();
    d3.select("#tooltip")
        .style("left", (e.clientX - rect.left + 20) + "px")
        .style("top", (e.clientY - rect.top - 20) + "px");
});

/**
 * Filters the visualization based on all active brush selections
 */
function applyRangeFilter() {
    const activeFilters = [];
    
    // Scan all 6 axes for active selections
    svg.selectAll(".brush")
        .filter(function(d) { return d3.brushSelection(this); })
        .each(function(d) {
            activeFilters.push({
                dimension: d.key,
                range: d3.brushSelection(this).map(y[d.key].invert)
            });
        });

    let counter = 0;
    
    // Hide lines that fall outside of ANY active selection
    foreground.classed("hidden", d => {
        const match = activeFilters.every(filter => {
            return d[filter.dimension] <= filter.range[0] && d[filter.dimension] >= filter.range[1];
        });
        if (match) counter++;
        return !match;
    });
    
    setCount(counter);
}

function setCount(n) {
    d3.select("#result-count").text(`Matching Institutions: ${n}`);
}
</script>
</body>
</html>
